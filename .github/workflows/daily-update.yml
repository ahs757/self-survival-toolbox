name: Daily Update

on:
  schedule:
    - cron: '0 10 * * *'  # 每天 UTC 10:00 (北京时间 18:00)
  workflow_dispatch:  # 手动触发

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update README with latest stats
        run: |
          echo "## 📊 Daily Stats" >> README.md
          echo "- Last updated: $(date '+%Y-%m-%d %H:%M')" >> README.md

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: daily update $(date '+%Y-%m-%d')"
          git push
