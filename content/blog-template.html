<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        header {
            text-align: center;
            padding: 4rem 0;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        header .meta { color: var(--text-muted); }
        article { padding: 3rem 0; }
        article h2 { margin: 2rem 0 1rem; color: var(--primary); }
        article h3 { margin: 1.5rem 0 0.8rem; }
        article p { margin-bottom: 1.2rem; }
        article code {
            background: var(--surface);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9em;
        }
        article pre {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        article pre code { background: none; padding: 0; }
        article ul, article ol { margin: 1rem 0 1rem 1.5rem; }
        article li { margin-bottom: 0.5rem; }
        article blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
        }
        .tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 2rem; }
        .tag {
            background: var(--surface);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--primary);
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{TITLE}}</h1>
            <div class="meta">
                <span>{{DATE}}</span> · <span>{{READ_TIME}} 分钟阅读</span>
            </div>
        </header>
        <article>
            {{CONTENT}}
        </article>
        <div class="tags">
            {{TAGS}}
        </div>
        <footer>
            <p>© 2026 自我生存工具箱 · 用技术创造价值</p>
        </footer>
    </div>
</body>
</html>
